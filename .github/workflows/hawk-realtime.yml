name: Hawk real-time governance

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: hawk-realtime-${{ github.event_name }}-${{ github.event.comment.id || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  process:
    if: >-
      vars.HAWK_CLIENT_ID != '' &&
      ((github.event_name == 'issue_comment' &&
        startsWith(github.event.comment.body, '/hawk')) ||
       github.event_name == 'pull_request_target')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Create short-lived Hawk source token
        id: hawk-source-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.HAWK_CLIENT_ID }}
          private-key: ${{ secrets.HAWK_PRIVATE_KEY }}
          owner: Cybrense-IT-Services
          repositories: Hawk
          permission-contents: read

      # Public repositories cannot reference a private organization Action
      # directly. Check out only the immutable Hawk source, never PR code.
      - name: Checkout reviewed Hawk Action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Cybrense-IT-Services/Hawk
          ref: b286310af031577c31f5d3e4fd662439b3ed9566
          token: ${{ steps.hawk-source-token.outputs.token }}
          path: .hawk-action
          persist-credentials: false

      - name: Process trusted Hawk event
        uses: ./.hawk-action
        with:
          allowed-organizations: Cybrense-IT-Services
          client-id: ${{ vars.HAWK_CLIENT_ID }}
          kill-switch: ${{ vars.HAWK_KILL_SWITCH || 'false' }}
          maintainer-repository: Cybrense-IT-Services/Hawk
          private-key: ${{ secrets.HAWK_PRIVATE_KEY }}
